<svg xmlns="http://www.w3.org/2000/svg" width="700" height="680" viewBox="0 0 700 680">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="700" height="680" fill="#ffffff"/>

  <text x="350" y="22" font-family="system-ui,sans-serif" font-size="13" fill="#444" text-anchor="middle" font-weight="600">MCP server — mcp_server/server.py</text>

  <!-- Claude Desktop -->
  <rect x="40" y="40" width="160" height="56" rx="8" fill="#F1EFE8" stroke="#888" stroke-width="0.5"/>
  <text x="120" y="64" font-family="system-ui,sans-serif" font-size="13" fill="#2C2C2A" text-anchor="middle" font-weight="600">Claude Desktop</text>
  <text x="120" y="82" font-family="system-ui,sans-serif" font-size="11" fill="#5F5E5A" text-anchor="middle">or private agent</text>

  <line x1="200" y1="68" x2="238" y2="68" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="219" y="60" font-family="system-ui,sans-serif" font-size="10" fill="#888" text-anchor="middle">launch</text>

  <!-- MCP server starts -->
  <rect x="240" y="40" width="200" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="64" font-family="system-ui,sans-serif" font-size="13" fill="#26215C" text-anchor="middle" font-weight="600">MCP server starts</text>
  <text x="340" y="82" font-family="system-ui,sans-serif" font-size="11" fill="#534AB7" text-anchor="middle">subprocess via stdio</text>

  <line x1="340" y1="96" x2="340" y2="134" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Handshake -->
  <rect x="240" y="136" width="200" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="160" font-family="system-ui,sans-serif" font-size="13" fill="#26215C" text-anchor="middle" font-weight="600">MCP handshake</text>
  <text x="340" y="178" font-family="system-ui,sans-serif" font-size="11" fill="#534AB7" text-anchor="middle">initialize, list_tools</text>

  <line x1="340" y1="192" x2="340" y2="230" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Exposes tools -->
  <rect x="240" y="232" width="200" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="256" font-family="system-ui,sans-serif" font-size="13" fill="#26215C" text-anchor="middle" font-weight="600">exposes tools</text>
  <text x="340" y="274" font-family="system-ui,sans-serif" font-size="11" fill="#534AB7" text-anchor="middle">query_rag, ingest_document</text>

  <line x1="440" y1="260" x2="478" y2="260" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- AI client sees -->
  <rect x="480" y="232" width="180" height="56" rx="8" fill="#F1EFE8" stroke="#888" stroke-width="0.5"/>
  <text x="570" y="256" font-family="system-ui,sans-serif" font-size="13" fill="#2C2C2A" text-anchor="middle" font-weight="600">AI client sees</text>
  <text x="570" y="274" font-family="system-ui,sans-serif" font-size="11" fill="#5F5E5A" text-anchor="middle">name + description</text>

  <line x1="340" y1="288" x2="340" y2="326" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="380" y="310" font-family="system-ui,sans-serif" font-size="10" fill="#888">tool call arrives</text>

  <!-- Tool execution box -->
  <rect x="60" y="328" width="580" height="240" rx="12" fill="none" stroke="#ccc" stroke-width="1" stroke-dasharray="5 4"/>
  <text x="350" y="348" font-family="system-ui,sans-serif" font-size="11" fill="#aaa" text-anchor="middle">tool execution</text>

  <!-- query_rag -->
  <rect x="80" y="358" width="220" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="190" y="382" font-family="system-ui,sans-serif" font-size="13" fill="#04342C" text-anchor="middle" font-weight="600">query_rag(question)</text>
  <text x="190" y="400" font-family="system-ui,sans-serif" font-size="11" fill="#085041" text-anchor="middle">POST /chat → answer</text>

  <!-- ingest_document -->
  <rect x="400" y="358" width="220" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="510" y="382" font-family="system-ui,sans-serif" font-size="13" fill="#04342C" text-anchor="middle" font-weight="600">ingest_document(path)</text>
  <text x="510" y="400" font-family="system-ui,sans-serif" font-size="11" fill="#085041" text-anchor="middle">POST /ingest → indexed</text>

  <line x1="190" y1="414" x2="190" y2="452" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="510" y1="414" x2="510" y2="452" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- FastAPI -->
  <rect x="250" y="454" width="200" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="350" y="478" font-family="system-ui,sans-serif" font-size="13" fill="#26215C" text-anchor="middle" font-weight="600">FastAPI</text>
  <text x="350" y="496" font-family="system-ui,sans-serif" font-size="11" fill="#534AB7" text-anchor="middle">runs RAG pipeline</text>

  <line x1="350" y1="568" x2="350" y2="606" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="390" y="590" font-family="system-ui,sans-serif" font-size="10" fill="#888">result string</text>

  <!-- Returns to client -->
  <rect x="250" y="608" width="200" height="56" rx="8" fill="#F1EFE8" stroke="#888" stroke-width="0.5"/>
  <text x="350" y="632" font-family="system-ui,sans-serif" font-size="13" fill="#2C2C2A" text-anchor="middle" font-weight="600">returns to client</text>
  <text x="350" y="650" font-family="system-ui,sans-serif" font-size="11" fill="#5F5E5A" text-anchor="middle">answer + sources string</text>
</svg>
