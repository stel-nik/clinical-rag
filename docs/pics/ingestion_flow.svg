<svg xmlns="http://www.w3.org/2000/svg" width="700" height="540" viewBox="0 0 700 540">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#854F0B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="700" height="540" fill="#ffffff"/>

  <text x="350" y="22" font-family="system-ui,sans-serif" font-size="13" fill="#444" text-anchor="middle" font-weight="600">Ingestion pipeline — POST /documents/ingest</text>

  <!-- Document -->
  <rect x="40" y="40" width="140" height="56" rx="8" fill="#F1EFE8" stroke="#888" stroke-width="0.5"/>
  <text x="110" y="64" font-family="system-ui,sans-serif" font-size="13" fill="#2C2C2A" text-anchor="middle" font-weight="600">Document</text>
  <text x="110" y="82" font-family="system-ui,sans-serif" font-size="11" fill="#5F5E5A" text-anchor="middle">.txt or .pdf file</text>

  <line x1="180" y1="68" x2="218" y2="68" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="199" y="60" font-family="system-ui,sans-serif" font-size="10" fill="#888" text-anchor="middle">POST</text>

  <!-- FastAPI -->
  <rect x="220" y="40" width="180" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="310" y="64" font-family="system-ui,sans-serif" font-size="13" fill="#26215C" text-anchor="middle" font-weight="600">FastAPI</text>
  <text x="310" y="82" font-family="system-ui,sans-serif" font-size="11" fill="#534AB7" text-anchor="middle">reads file, validates</text>

  <line x1="310" y1="96" x2="310" y2="134" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="325" y="118" font-family="system-ui,sans-serif" font-size="10" fill="#888">calls</text>

  <!-- chunk_text -->
  <rect x="220" y="136" width="180" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="310" y="160" font-family="system-ui,sans-serif" font-size="13" fill="#26215C" text-anchor="middle" font-weight="600">chunk_text()</text>
  <text x="310" y="178" font-family="system-ui,sans-serif" font-size="11" fill="#534AB7" text-anchor="middle">500 words, 50 overlap</text>

  <line x1="310" y1="192" x2="310" y2="230" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="325" y="214" font-family="system-ui,sans-serif" font-size="10" fill="#888">chunks[]</text>

  <!-- embed_text -->
  <rect x="220" y="232" width="180" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="310" y="256" font-family="system-ui,sans-serif" font-size="13" fill="#26215C" text-anchor="middle" font-weight="600">embed_text()</text>
  <text x="310" y="274" font-family="system-ui,sans-serif" font-size="11" fill="#534AB7" text-anchor="middle">one chunk at a time</text>

  <line x1="400" y1="260" x2="438" y2="260" stroke="#854F0B" stroke-width="1" marker-end="url(#arrow-amber)"/>
  <text x="419" y="252" font-family="system-ui,sans-serif" font-size="10" fill="#854F0B" text-anchor="middle">POST /api/embed</text>

  <!-- nomic-embed-text -->
  <rect x="440" y="232" width="210" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="545" y="256" font-family="system-ui,sans-serif" font-size="13" fill="#412402" text-anchor="middle" font-weight="600">nomic-embed-text</text>
  <text x="545" y="274" font-family="system-ui,sans-serif" font-size="11" fill="#854F0B" text-anchor="middle">text → 768 numbers</text>

  <path d="M545 288 L545 320 L310 320 L310 296" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="440" y="314" font-family="system-ui,sans-serif" font-size="10" fill="#888" text-anchor="middle">vector[]</text>

  <!-- store_chunks -->
  <rect x="220" y="332" width="180" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="310" y="356" font-family="system-ui,sans-serif" font-size="13" fill="#26215C" text-anchor="middle" font-weight="600">store_chunks()</text>
  <text x="310" y="374" font-family="system-ui,sans-serif" font-size="11" fill="#534AB7" text-anchor="middle">builds PointStruct + UUID</text>

  <line x1="400" y1="360" x2="438" y2="360" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="419" y="352" font-family="system-ui,sans-serif" font-size="10" fill="#888" text-anchor="middle">upsert</text>

  <!-- Qdrant -->
  <rect x="440" y="332" width="210" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="545" y="356" font-family="system-ui,sans-serif" font-size="13" fill="#042C53" text-anchor="middle" font-weight="600">Qdrant</text>
  <text x="545" y="374" font-family="system-ui,sans-serif" font-size="11" fill="#185FA5" text-anchor="middle">UUID → vector + payload</text>

  <line x1="310" y1="388" x2="310" y2="426" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Response -->
  <rect x="220" y="428" width="180" height="56" rx="8" fill="#F1EFE8" stroke="#888" stroke-width="0.5"/>
  <text x="310" y="452" font-family="system-ui,sans-serif" font-size="13" fill="#2C2C2A" text-anchor="middle" font-weight="600">Response</text>
  <text x="310" y="470" font-family="system-ui,sans-serif" font-size="11" fill="#5F5E5A" text-anchor="middle">status, filename, chunks</text>
</svg>
